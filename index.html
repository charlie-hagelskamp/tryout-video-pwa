<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Tryouts Video Locker">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tryouts Video Locker</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="apple-touch-icon" href="./icons/noblesville-logo-512.png">
    <link rel="icon" href="./icons/noblesville-logo.png" type="image/png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="Tryout session">
        <img class="brand-logo" src="./assets/noblesville-logo.png" alt="Noblesville Travel Baseball">
        <div class="title-block">
          <p class="eyebrow">Baseball Tryouts</p>
          <h1>Tryouts Video Locker</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden aria-label="Install app">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3v12m0 0 5-5m-5 5-5-5M5 20h14"></path>
          </svg>
        </button>
      </section>

      <section class="category-panel" aria-labelledby="categoryLabel">
        <div class="section-heading">
          <h2 id="categoryLabel">Category</h2>
          <span id="savedCount">0 saved</span>
        </div>
        <div class="segmented" role="radiogroup" aria-label="Evaluation category">
          <button class="segment" type="button" role="radio" aria-checked="true" data-category="Hitting">Hitting</button>
          <button class="segment" type="button" role="radio" aria-checked="false" data-category="Infield">Infield</button>
          <button class="segment" type="button" role="radio" aria-checked="false" data-category="Outfield">Outfield</button>
          <button class="segment" type="button" role="radio" aria-checked="false" data-category="Pitching">Pitching</button>
        </div>
      </section>

      <section class="capture-panel" aria-labelledby="captureLabel">
        <div class="section-heading">
          <h2 id="captureLabel">Player</h2>
          <span id="storageEstimate">Local storage</span>
        </div>

        <label class="field">
          <span>Player number</span>
          <input id="playerNumber" type="text" inputmode="numeric" autocomplete="off" placeholder="27">
        </label>

        <div class="actions single-action">
          <label class="primary-action file-action">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 10l4.55-2.28A1 1 0 0 1 21 8.62v6.76a1 1 0 0 1-1.45.9L15 14"></path>
              <rect x="3" y="6" width="12" height="12" rx="2"></rect>
            </svg>
            <span>Record</span>
            <input id="recordInput" type="file" accept="video/*" capture="environment">
          </label>
        </div>
      </section>

      <section class="list-panel" aria-labelledby="savedLabel">
        <div class="section-heading">
          <h2 id="savedLabel">Saved Videos</h2>
          <button class="text-button" id="clearDoneButton" type="button">Clear shared</button>
        </div>
        <label class="field search-field">
          <span>Search saved videos</span>
          <input id="videoSearch" type="search" autocomplete="off" placeholder="Player, category, or filename">
        </label>
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M6 7v12h12V7M9 7V5h6v2"></path>
          </svg>
          <p>No videos saved yet.</p>
        </div>
        <div class="empty-state" id="noResultsState" hidden>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-4-4"></path>
          </svg>
          <p>No matching videos.</p>
        </div>
        <ul class="video-list" id="videoList"></ul>
      </section>
    </main>

    <dialog id="reviewDialog">
      <form method="dialog" class="review-card">
        <div class="review-head">
          <h2>Save Video</h2>
          <button class="icon-button" value="cancel" aria-label="Close preview">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12"></path>
            </svg>
          </button>
        </div>
        <video id="previewVideo" controls playsinline></video>
        <label class="field" id="filenameField">
          <span>Filename</span>
          <input id="filenameInput" type="text" autocomplete="off">
        </label>
        <menu class="dialog-actions">
          <button class="secondary-action" value="cancel" type="submit">Cancel</button>
          <button class="primary-action" id="saveVideoButton" value="default" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
              <path d="M17 21v-8H7v8M7 3v5h8"></path>
            </svg>
            <span>Save</span>
          </button>
        </menu>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
